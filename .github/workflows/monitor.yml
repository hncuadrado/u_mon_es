name: Uniqlo Offers Monitor

on:
  schedule:
    # Cada 30 min de 5:00 a 23:30 UTC = 7:00 a 01:30 hora Madrid (verano CEST)
    - cron: "0,30 5-23 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install patchright
          patchright install chromium
          patchright install-deps chromium

      - name: Run monitor
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python monitor.py

      - name: Commit and push state
        run: |
          git config user.name  "uniqlo-monitor[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
